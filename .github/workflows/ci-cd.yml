name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Quality checks and build verification
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 📋 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: npm ci
        
      - name: 🔍 Run ESLint
        run: npm run lint 2>/dev/null || echo "⚠️ ESLint issues found but continuing..."
        continue-on-error: true
        
      - name: 🏗️ Type check
        run: npm run type-check
        continue-on-error: true
        
      - name: 🧪 Run tests (if available)
        run: npm run test --if-present
        continue-on-error: true
        
      - name: 🔨 Build verification
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # Security scanning
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 📋 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: npm ci
        
      - name: 🔍 Run security audit
        run: npm audit --audit-level moderate
        continue-on-error: true
        
      - name: 🔒 Check for vulnerabilities
        run: |
          if npm audit --audit-level high --dry-run; then
            echo "✅ No high-severity vulnerabilities found"
          else
            echo "⚠️ High-severity vulnerabilities found (non-blocking)"
            npm audit --audit-level high || true
          fi
        continue-on-error: true

  # Deployment is handled automatically by Vercel's Git Integration.
  # Vercel auto-deploys on push to main (production) and on PRs (preview).
  # No manual deploy step needed in this pipeline.
